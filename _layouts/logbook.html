<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ page.title }}</title>

    <style>
      :root {
        --bg: #0f172a;
        --sidebar: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #3b82f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
      }

      /* Sidebar */
      nav {
        width: 260px;
        height: 100vh;
        position: fixed;
        background: var(--sidebar);
        padding: 1.5rem;
        border-right: 1px solid #1f2933;
      }

      nav h3 {
        margin-top: 0;
        font-size: 1.2rem;
      }

      nav h4 {
        color: var(--muted);
        margin-top: 2rem;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        text-transform: uppercase;
      }

      nav a {
        display: block;
        padding: 6px 8px;
        margin: 4px 0;
        color: var(--muted);
        text-decoration: none;
        border-radius: 6px;
        font-size: 0.95rem;
      }

      nav a:hover {
        background: #1f2937;
        color: white;
      }

      /* Content */
      main {
        margin-left: 260px;
        padding: 3rem;
        max-width: 900px;
      }

      h1 {
        font-size: 2.2rem;
        margin-bottom: 0.5rem;
      }

      h2 {
        font-size: 1.5rem;
        margin-top: 2.5rem;
        border-bottom: 1px solid #1f2937;
        padding-bottom: 0.3rem;
      }

      h3 {
        color: var(--muted);
        margin-top: 0;
      }

      p {
        line-height: 1.7;
        color: #d1d5db;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* Smooth scroll */
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>

  <body>
    <nav>
      <h3>📘 Logbook</h3>

      <h4>Week 1</h4>
      <a href="#day1">Day 1 — 30/03</a>
      <a href="#day2">Day 2 — 31/03</a>
      <a href="#day3">Day 3 — 01/04</a>
    </nav>

    <main>{{ content }}</main>
  </body>
</html>
